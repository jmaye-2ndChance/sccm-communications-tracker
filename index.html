<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCCM Communications Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --app-fg:#eaf1fb; --muted:#9db8dd; --hairline:rgba(255,255,255,.10);
    --col-bg:#14335f; --card-bg:#d9e9f6; --card-fg:#12335F; --card-muted:#4f6a8a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 120% at 50% -20%,#123a72,#0b2247 62%) fixed #0b2247;
    font-family:'Public Sans',system-ui,-apple-system,sans-serif;color:var(--app-fg)}
  a{color:#8fb9ec;text-decoration:none} a:hover{color:#fff}
  .wrap{min-height:100vh;padding:26px 30px 40px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
  .brand{display:flex;align-items:center;gap:18px}
  .brand img{height:58px;width:auto}
  .brand .divider{border-left:2px solid rgba(255,255,255,.16);padding-left:18px}
  .title{font-family:'Nunito',sans-serif;font-weight:800;font-size:24px;color:#fff;line-height:1.08}
  .subtitle{font-size:13px;color:var(--muted);margin-top:3px}
  .localbadge{display:inline-flex;align-items:center;gap:7px;background:rgba(232,161,61,.16);border:1px solid rgba(232,161,61,.45);
    color:#f2c98a;border-radius:14px;padding:2px 10px;font-size:11.5px;font-weight:600;margin-left:8px}
  .localbadge button{background:none;border:none;color:#f2c98a;font:inherit;font-weight:700;cursor:pointer;padding:0;text-decoration:underline}
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  label.sort{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:600}
  select{font-family:inherit;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#eaf1fb;
    border-radius:10px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer}
  select option{color:#12335F}
  .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:22px}
  .stat{background:var(--col-bg);border:1px solid rgba(255,255,255,.12);border-radius:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.22);padding:15px 17px}
  .stat .value{font-family:'Nunito',sans-serif;font-weight:800;font-size:32px;line-height:.95;font-variant-numeric:tabular-nums}
  .stat .label{font-size:12px;color:var(--muted);margin-top:7px;font-weight:600;letter-spacing:.01em}
  .board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;align-items:start}
  .col{background:var(--col-bg);border:1px solid rgba(255,255,255,.09);border-radius:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.25);overflow:visible;display:flex;flex-direction:column}
  .col-head{display:flex;align-items:center;gap:8px;padding:14px 14px 11px;border-bottom:1px solid rgba(255,255,255,.10)}
  .col-head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
  .col-head .name{font-family:'Nunito',sans-serif;font-weight:800;font-size:13.5px;color:#fff;line-height:1.22;flex:1;min-width:0}
  .col-head .count{background:color-mix(in srgb,var(--accent) 15%,#fff);color:#12335F;font-weight:700;font-size:12.5px;
    border-radius:20px;padding:2px 10px;font-variant-numeric:tabular-nums;flex:none}
  .cards{padding:11px 11px 4px;display:flex;flex-direction:column;gap:8px}
  .card{background:var(--card-bg);border:1px solid #c4dbef;border-left:4px solid var(--accent);border-radius:9px;padding:10px 12px;position:relative}
  .cname{font-weight:600;font-size:13.5px;color:var(--card-fg);cursor:pointer;line-height:1.3;padding-right:44px}
  .cid{font-size:12.5px;color:var(--card-muted);cursor:pointer;font-variant-numeric:tabular-nums;margin-top:3px;letter-spacing:.01em}
  .dates{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:7px;font-size:11.5px;color:var(--card-muted)}
  .dates b{color:var(--card-fg);font-variant-numeric:tabular-nums}
  .acts{position:absolute;top:7px;right:7px;display:none;gap:3px}
  .card:hover .acts{display:flex}
  .acts button{border:1px solid #b3cce4;background:#fff;color:#3a5a80;border-radius:6px;font-size:11.5px;
    padding:2px 7px;cursor:pointer;font-family:inherit;line-height:1.4}
  .acts button:hover{border-color:#7c9cbe;color:#12335F}
  .acts button.danger{color:#a33;border-color:#dbb}
  .acts button.danger:hover{background:#fbeaea}
  .grouplabel{font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    padding:9px 2px 3px;border-top:1px dashed var(--hairline);margin-top:3px}
  .addbtn{margin:4px 11px 12px;border:1px dashed rgba(255,255,255,.28);background:none;color:var(--muted);
    border-radius:8px;font-size:12.5px;padding:7px;cursor:pointer;font-family:inherit}
  .addbtn:hover{color:#fff;border-color:rgba(255,255,255,.55)}
  .addform{margin:4px 11px 12px;display:flex;flex-direction:column;gap:6px}
  .addform input{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.95);color:#12335F;
    border-radius:7px;padding:7px 10px;font:inherit;font-size:13px}
  .addform .row{display:flex;gap:6px}
  .addform .row button{flex:1;border:none;border-radius:7px;padding:6px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
  .addform .row .go{background:#e8a13d;color:#2c1f08}
  .addform .row .no{background:rgba(255,255,255,.15);color:#eaf1fb}
  .movemenu{position:absolute;z-index:60;background:#fff;border:1px solid #c4dbef;border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);padding:5px;display:flex;flex-direction:column;min-width:230px}
  .movemenu .mm-title{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#7b93ad;padding:6px 10px 3px}
  .movemenu button{border:none;background:none;text-align:left;padding:7px 10px;border-radius:7px;font-size:13px;
    color:#12335F;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
  .movemenu button:hover{background:#e8f1fa}
  .movemenu .mdot{width:8px;height:8px;border-radius:50%;flex:none}
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);background:#f2f7fc;color:#12335F;
    font-size:13.5px;font-weight:700;padding:10px 20px;border-radius:24px;box-shadow:0 12px 34px rgba(0,0,0,.35);z-index:100;
    transition:transform .18s ease,opacity .18s ease;opacity:0;pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .hint{color:#7d95b8;font-size:12px;margin-top:16px;text-align:center}
  @media (max-width:1280px){ .board{grid-template-columns:repeat(3,minmax(0,1fr))} .stats{grid-template-columns:repeat(3,minmax(0,1fr))} }
  @media (max-width:760px){ .board{grid-template-columns:repeat(2,minmax(0,1fr))} .stats{grid-template-columns:repeat(2,minmax(0,1fr))} .wrap{padding:18px 14px 32px} .acts{display:flex} }
  @media (max-width:480px){ .board{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <img id="logoimg" src="sccm_logo_white.png" alt="Second Chance Case Management" onerror="this.style.display='none'">
      <div class="divider">
        <div class="title">Communications Tracker</div>
        <div class="subtitle"><span id="total"></span> members &middot; Published <span id="updated"></span><span id="localnote"></span></div>
      </div>
    </div>
    <div class="toolbar">
      <label class="sort">Sort
        <select id="sortSel">
          <option value="default">Default order</option>
          <option value="name">Name &middot; A&ndash;Z</option>
          <option value="id">ID number</option>
        </select>
      </label>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="board" id="board"></div>
  <div class="hint">Hover a card for Move / Remove &middot; changes save automatically in this browser only &middot; ask Claude to publish them for everyone</div>
</div>
<div id="toast"></div>
<script>
var PUBLISHED_DATE = "July 23, 2026";
var STORE_KEY = "sccmTrackerData_v2";
var DEFAULT_DATA = {
  categories: [
    {id:"submit",name:"Need to Submit to DFCS",members:[
      {n:"Hickey, Susie",id:"362282"},{n:"Hartley, Audrey",id:"74799"},{n:"Cornell, Sylvia",id:"184728"},
      {n:"Davis, Michael",id:"87979"},{n:"Vasquez, Jose",id:"91014"},{n:"Pirulis, Froso",id:"96383"},
      {n:"Griffin, Wanda",id:"450346"}
    ]},
    {id:"waiting",name:"Waiting to Submit Escalation List",members:[
      {n:"Mccollum-Parks, Deborah",id:"94396"},{n:"Walker, James",id:"483582"},{n:"Jefferson, Lucille",id:"98690"},
      {n:"Davis, Mary",id:"89341"},{n:"Tribble, Gloria",id:"94219"},{n:"Dodson, Sylinda",id:"485411"},
      {n:"Mace, Donald",id:"91773"},{n:"Sears, Maduria",id:"97090"},{n:"Rodriguez-Elias, Orlando",id:"88925"},
      {n:"Turner, Ashley",id:"89079"},{n:"Rogers, Alvina",id:"99292"},{n:"Powell, Fred",id:"88004"},
      {n:"Johnson, Willie",id:"88898"},{n:"Pride, Emmette",id:"87459"},{n:"Aina-Adedokun, Funmi",id:"94574"},
      {n:"Raybon, Barbara",id:"98734"},{n:"Jones, Dave",id:"87771"},{n:"Hunter, Betty Jean",id:"91808"},
      {n:"Battle, Tommy",id:"84620"},{n:"O'Shields, Sharon",id:"96310"},{n:"Richardson, Ruth",id:"96782"},
      {n:"Walker, Daniel",id:"25035"},{n:"Johnson, Billy",id:"484528"},{n:"Samuels, Tory",id:"483373"},
      {n:"Jones, DMontae",id:"82474",g:"Month Out"},{n:"Wells, Joanna",id:"184842",g:"Month Out"},
      {n:"Adamson, Carolyn",id:"97977",g:"Month Out"},{n:"Williams, Lucille",id:"95657",g:"Month Out"}
    ]},
    {id:"awaiting",name:"Awaiting Escalation List Return",members:[
      {n:"Stewart, Francis",id:"71813"},{n:"Nguyen, Dung",id:"81499"}
    ]},
    {id:"nocomm",name:"No Communication",members:[
      {n:"Garrett, Betty",id:"89936"},{n:"Almeida, Taryn",id:"86154"}
    ]},
    {id:"active",name:"Active Communication",members:[
      {n:"Long, Harry",id:"488329"},{n:"Ha, A",id:"97658"},{n:"Wondemagenehu, Roman",id:"95222"}
    ]},
    {id:"corrdate",name:"Need Corrected Approval Date",members:[
      {n:"Samuels, Tory",id:"483373",eff:"7/1/26",needed:"3/23/26"},
      {n:"Spears, Kevin",id:"93964",eff:"3/1/26",needed:"12/18/25"},
      {n:"Bohannon, Teresa",id:"449497",eff:"",needed:"2/1/26"}
    ]}
  ]
};
var ACCENTS = {submit:'#C0873C',waiting:'#3E72A8',awaiting:'#3E8C8C',nocomm:'#B0607F',active:'#4E8B62',corrdate:'#6E63A6'};
var DEFAULT_JSON = JSON.stringify(DEFAULT_DATA);
var sort = 'default';
var data;
try { data = JSON.parse(localStorage.getItem(STORE_KEY)) || JSON.parse(DEFAULT_JSON); }
catch(e){ data = JSON.parse(DEFAULT_JSON); }
var openForm = null;

function hasLocalEdits(){ return JSON.stringify(data) !== DEFAULT_JSON; }
function save(){
  try {
    if(hasLocalEdits()) localStorage.setItem(STORE_KEY, JSON.stringify(data));
    else localStorage.removeItem(STORE_KEY);
  } catch(e){}
}
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function sortMembers(list){
  var arr = list.slice();
  if(sort==='name') arr.sort(function(a,b){ return a.n.localeCompare(b.n); });
  else if(sort==='id') arr.sort(function(a,b){ return String(a.id||'').localeCompare(String(b.id||''),undefined,{numeric:true}); });
  return arr;
}
function cardHTML(m, cat){
  var isCorr = cat.id==='corrdate';
  var key = esc(cat.id)+'|'+esc(m.n)+'|'+esc(m.id);
  var html = '<div class="card" data-key="'+key+'">'
    + '<div class="acts">'
    + '<button class="mv" title="Move to another section">Move</button>'
    + '<button class="danger rm" title="Remove member">&times;</button>'
    + '</div>'
    + '<div class="cname" data-copy="'+esc(m.n)+'" title="Click to copy name">'+esc(m.n)+'</div>'
    + '<div class="cid" data-copy="'+esc(m.id)+'" title="Click to copy ID">'+esc(m.id)+'</div>';
  if(isCorr){
    html += '<div class="dates"><span>Effective <b>'+esc(m.eff||'—')+'</b></span><span>Needed <b>'+esc(m.needed||'—')+'</b></span></div>';
  }
  if(m.note){ html += '<div class="dates">'+esc(m.note)+'</div>'; }
  return html + '</div>';
}
function render(){
  var total = data.categories.reduce(function(a,c){ return a+c.members.length; },0);
  document.getElementById('total').textContent = total;
  document.getElementById('updated').textContent = PUBLISHED_DATE;
  document.getElementById('localnote').innerHTML = hasLocalEdits()
    ? '<span class="localbadge">local edits (this browser) &middot; <button id="resetBtn">reset</button></span>' : '';
  function byId(id){ var c = data.categories.find(function(x){ return x.id===id; }); return c ? c.members.length : 0; }
  var stats = [
    {label:'Total members', value:total, accent:'#5B93D0'},
    {label:'Need to submit', value:byId('submit'), accent:'#D69A4E'},
    {label:'Awaiting escalation', value:byId('waiting'), accent:'#5E93C8'},
    {label:'No communication', value:byId('nocomm'), accent:'#C87E9A'},
    {label:'Need corrected date', value:byId('corrdate'), accent:'#8E83C0'}
  ];
  document.getElementById('stats').innerHTML = stats.map(function(s){
    return '<div class="stat"><div class="value" style="color:'+s.accent+'">'+s.value+'</div><div class="label">'+esc(s.label)+'</div></div>';
  }).join('');
  document.getElementById('board').innerHTML = data.categories.map(function(c){
    var sorted = sortMembers(c.members);
    var main = sorted.filter(function(m){ return !m.g; });
    var gNames = sorted.filter(function(m){ return m.g; }).map(function(m){ return m.g; })
      .filter(function(v,i,a){ return a.indexOf(v)===i; });
    var cards = main.map(function(m){ return cardHTML(m,c); }).join('');
    gNames.forEach(function(g){
      cards += '<div class="grouplabel">'+esc(g)+'</div>'
        + sorted.filter(function(m){ return m.g===g; }).map(function(m){ return cardHTML(m,c); }).join('');
    });
    return '<div class="col" style="--accent:'+ACCENTS[c.id]+'" data-cat="'+esc(c.id)+'">'
      + '<div class="col-head"><span class="dot"></span><span class="name">'+esc(c.name)+'</span><span class="count">'+c.members.length+'</span></div>'
      + '<div class="cards">'+cards+'</div>'
      + (openForm===c.id
        ? '<div class="addform"><input class="af-name" placeholder="Last, First" autocomplete="off">'
          + '<input class="af-id" placeholder="ID number" autocomplete="off">'
          + '<div class="row"><button class="go">Add</button><button class="no">Cancel</button></div></div>'
        : '<button class="addbtn">+ Add member</button>')
      + '</div>';
  }).join('');
  var rb = document.getElementById('resetBtn');
  if(rb) rb.addEventListener('click', function(ev){
    ev.stopPropagation();
    data = JSON.parse(DEFAULT_JSON); save(); render(); showToast('Reset to published version');
  });
  var nameInput = document.querySelector('.af-name');
  if(nameInput) nameInput.focus();
}
function findMember(key){
  var parts = key.split('|');
  var cat = data.categories.find(function(c){ return c.id===parts[0]; });
  if(!cat) return null;
  var idx = cat.members.findIndex(function(m){ return m.n===parts[1] && String(m.id)===parts[2]; });
  if(idx<0) return null;
  return {cat:cat, idx:idx, m:cat.members[idx]};
}
function closeMenus(){ document.querySelectorAll('.movemenu').forEach(function(el){ el.remove(); }); }
function openMoveMenu(btn, key){
  closeMenus();
  var found = findMember(key);
  if(!found) return;
  var menu = document.createElement('div');
  menu.className = 'movemenu';
  var opts = [];
  data.categories.forEach(function(c){
    if(c.id!==found.cat.id || found.m.g) opts.push({cid:c.id, label:c.name, g:null});
  });
  if(found.cat.id!=='waiting' || found.m.g!=='Month Out'){
    opts.push({cid:'waiting', label:'Waiting to Submit — Month Out', g:'Month Out'});
  }
  menu.innerHTML = '<div class="mm-title">Move to</div>' + opts.map(function(o,i){
    var isSame = o.cid===found.cat.id && !o.g === !found.m.g;
    return isSame ? '' : '<button data-i="'+i+'"><span class="mdot" style="background:'+ACCENTS[o.cid]+'"></span>'+esc(o.label)+'</button>';
  }).join('');
  document.body.appendChild(menu);
  var r = btn.getBoundingClientRect();
  var mw = 240;
  var left = Math.min(r.left + window.scrollX, window.scrollX + document.documentElement.clientWidth - mw - 10);
  menu.style.left = left + 'px';
  menu.style.top = (r.bottom + window.scrollY + 4) + 'px';
  menu.addEventListener('click', function(e){
    var b = e.target.closest('button[data-i]');
    if(!b) return;
    var o = opts[+b.getAttribute('data-i')];
    var src = found.cat, m = found.m;
    src.members.splice(found.idx,1);
    var dest = data.categories.find(function(c){ return c.id===o.cid; });
    var moved = {n:m.n, id:m.id};
    if(m.note) moved.note = m.note;
    if(o.g) moved.g = o.g;
    if(o.cid==='corrdate'){ moved.eff = m.eff||''; moved.needed = m.needed||''; }
    dest.members.push(moved);
    save(); closeMenus(); render();
    showToast(m.n + '  →  ' + (o.g ? o.label : dest.name));
  });
}
var toastTimer;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.movemenu')) closeMenus();
  var card = e.target.closest('.card');
  if(card){
    var key = card.getAttribute('data-key');
    if(e.target.closest('.mv')){ openMoveMenu(e.target.closest('.mv'), key); return; }
    if(e.target.closest('.rm')){
      var b = e.target.closest('.rm');
      if(b.getAttribute('data-armed')){
        var f = findMember(key);
        if(f){ f.cat.members.splice(f.idx,1); save(); render(); showToast('Removed ' + f.m.n); }
      } else {
        b.setAttribute('data-armed','1'); b.textContent = 'Sure?';
        setTimeout(function(){ if(b.isConnected){ b.removeAttribute('data-armed'); b.innerHTML='&times;'; } }, 2500);
      }
      return;
    }
    var el = e.target.closest('[data-copy]');
    if(el){
      var v = el.getAttribute('data-copy');
      if(navigator.clipboard) navigator.clipboard.writeText(v)['catch'](function(){});
      showToast('Copied  ·  ' + v);
      return;
    }
  }
  var col = e.target.closest('.col');
  if(col){
    var cid = col.getAttribute('data-cat');
    if(e.target.closest('.addbtn')){ openForm = cid; render(); return; }
    if(e.target.closest('.addform .no')){ openForm = null; render(); return; }
    if(e.target.closest('.addform .go')){
      var nm = col.querySelector('.af-name').value.trim();
      var idv = col.querySelector('.af-id').value.trim();
      if(!nm){ showToast('Enter a name first'); return; }
      var c = data.categories.find(function(x){ return x.id===cid; });
      var nu = {n:nm, id:idv};
      if(cid==='corrdate'){ nu.eff=''; nu.needed=''; }
      c.members.push(nu);
      openForm = null; save(); render(); showToast('Added ' + nm);
      return;
    }
  }
});
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && e.target.closest && e.target.closest('.addform')){
    var col = e.target.closest('.col');
    var go = col && col.querySelector('.addform .go');
    if(go) go.click();
  }
  if(e.key==='Escape'){ closeMenus(); if(openForm){ openForm=null; render(); } }
});
document.getElementById('sortSel').addEventListener('change', function(e){ sort = e.target.value; render(); });
render();
</script>
</body>
</html>
