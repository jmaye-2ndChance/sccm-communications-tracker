function fmtStamp(){
  var d = new Date();
  var hh = d.getHours(), ampm = hh >= 12 ? 'PM' : 'AM';
  hh = hh % 12; if(hh === 0) hh = 12;
  var mm = ('0' + d.getMinutes()).slice(-2);
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(-2) + ' ' + hh + ':' + mm + ' ' + ampm;
}
function todayStr(){
  var d = new Date();
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(-2);
}
function daysSince(v){
  var parts = String(v).split('/');
  if(parts.length !== 3) return null;
  var y = +parts[2]; if(y < 100) y += 2000;
  var d = new Date(y, (+parts[0])-1, +parts[1]);
  if(isNaN(d.getTime())) return null;
  var days = Math.floor((new Date().getTime() - d.getTime()) / 86400000);
  return days < 0 ? null : days;
}
function subDays(v){
  var days = daysSince(v);
  if(days === null) return '';
  return ' <span class="sd">&middot; ' + days + (days === 1 ? ' day' : ' days') + '</span>';
}

  if(!v) return [];

  }
  db.ref('board').set(toBoard(data))['catch'](function(e){
    revert();
    setTimeout(function(){ showToast('Save failed - check your connection'); }, 0);
  });
}
function maybeSeed(){
  if(auth.currentUser && booted && lastRemote === null && !seeded){
    seeded = true;
    db.ref('board').set(toBoard(JSON.parse(DEFAULT_JSON)));
  }
}
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function sortMembers(list){
  var arr = list.slice();
  if(sort==='name') arr.sort(function(a,b){ return a.n.localeCompare(b.n); });
  else if(sort==='id') arr.sort(function(a,b){ return String(a.id||'').localeCompare(String(b.id||''),undefined,{numeric:true}); });
  return arr;
}
function cardHTML(m, cat){
  var isCorr = cat.id==='corrdate';
  var key = esc(cat.id)+'|'+esc(m.n)+'|'+esc(m.id);
  var html = '<div class="card" data-key="'+key+'">'
    + '<div class="acts">'
    + '<button class="nt" title="Add or edit note">📝</button>'
    + '<button class="mv" title="Move to another section">Move</button>'
    + '<button class="danger rm" title="Remove member">&times;</button>'
    + '</div>'
    + '<div class="cname" data-copy="'+esc(m.n)+'" title="Click to copy name">'+esc(m.n)+'</div>'
    + '<div><div class="cid" data-copy="'+esc(m.id)+'" title="Click to copy ID">'+esc(m.id)+'</div>'
    + (m.ms
      ? '<span class="ms'+(m.ms==='QMB'?' is-qmb':(m.ms==='None'?' is-none':''))+'" title="Click to change Medicaid status">'+esc(m.ms)+'</span>'
      : '<button class="ms-add" title="Set Medicaid status">+ status</button>')
    + '</div>';
  if(editSubKey===key){
    html += '<div class="subform"><input class="sf-date" placeholder="M/D/YY" value="'+esc(m.sub||'')+'" autocomplete="off">'
      + '<div class="row"><button class="today">Today</button><button class="go">Save</button><button class="no">Cancel</button></div></div>';
  } else if(m.sub){
    html += '<div><span class="sub" title="Click to edit the date submitted to DFCS">DFCS '+esc(m.sub)+subDays(m.sub)+'</span></div>';
  } else {
    html += '<div><button class="sub-add" title="Set the date this was submitted to DFCS">+ DFCS date</button></div>';
  }
  if(m.g === 'Month Out' && m.sub && editSubKey !== key){
    var ds = daysSince(m.sub);
    if(ds !== null){
      if(ds >= ESCALATION_DAYS){
        html += '<div><span class="elig ok">Eligible now &middot; 30+ days</span></div>'
          + '<button class="upbtn" title="Move up to the main escalation list">&uarr; Move to escalation list</button>';
      } else {
        var left = ESCALATION_DAYS - ds;
        html += '<div><span class="elig wait">Eligible in ' + left + (left === 1 ? ' day' : ' days') + '</span></div>';
      }
    }
  }
  if(isCorr){
    html += '<div class="dates"><span>Effective <b>'+esc(m.eff||'—')+'</b></span><span>Needed <b>'+esc(m.needed||'—')+'</b></span></div>';
  }
  if(editNoteKey===key){
    html += '<div class="noteform"><textarea placeholder="Type a note...">'+esc(m.note||'')+'</textarea>'
      + '<div class="row"><button class="go">Save note</button><button class="no">Cancel</button></div></div>';
  } else if(m.note){
    html += '<div class="note" title="Click to edit note">'+esc(m.note)
      + (m.noteDate ? '<span class="ndate">'+esc(m.noteDate)+'</span>' : '')
      + '</div>';
  }
  return html + '</div>';
}
function render(){
  var total = data.categories.reduce(function(a,c){ return a+c.members.length; },0);
  document.getElementById('total').textContent = total;
  function byId(id){ var c = data.categories.find(function(x){ return x.id===id; }); return c ? c.members.length : 0; }
  function byMs(v){ return data.categories.reduce(function(a,c){ return a + c.members.filter(function(m){ return m.ms===v; }).length; },0); }
  var stats = [
    {label:'Total members', value:total, accent:'#5B93D0'},
    {label:'QMB', value:byMs('QMB'), accent:'#D9B578'},
    {label:'None', value:byMs('None'), accent:'#D993AC'},
    {label:'Active', value:byMs('Active'), accent:'#6FAF8B'},
    {label:'Need to submit', value:byId('submit'), accent:'#D69A4E'}
  ];
  document.getElementById('stats').innerHTML = stats.map(function(s){
    return '<div class="stat"><div class="value" style="color:'+s.accent+'">'+s.value+'</div><div class="label">'+esc(s.label)+'</div></div>';
  }).join('');
  document.getElementById('board').innerHTML = data.categories.map(function(c){
    var sorted = sortMembers(c.members);
    var main = sorted.filter(function(m){ return !m.g; });
    var gNames = sorted.filter(function(m){ return m.g; }).map(function(m){ return m.g; })
      .filter(function(v,i,a){ return a.indexOf(v)===i; });
    var cards = main.map(function(m){ return cardHTML(m,c); }).join('');
    gNames.forEach(function(g){
      cards += '<div class="grouplabel">'+esc(g)+'</div>'
        + sorted.filter(function(m){ return m.g===g; }).map(function(m){ return cardHTML(m,c); }).join('');
    });
    return '<div class="col" style="--accent:'+ACCENTS[c.id]+'" data-cat="'+esc(c.id)+'">'
      + '<div class="col-head"><span class="dot"></span><span class="name">'+esc(c.name)+'</span><span class="count">'+c.members.length+'</span></div>'
      + '<div class="cards">'+cards+'</div>'
      + (openForm===c.id
        ? '<div class="addform"><input class="af-name" placeholder="Last, First" autocomplete="off">'
          + '<input class="af-id" placeholder="ID number" autocomplete="off">'
          + '<div class="row"><button class="go">Add</button><button class="no">Cancel</button></div></div>'
        : '<button class="addbtn">+ Add member</button>')
      + '</div>';
  }).join('');
  var nameInput = document.querySelector('.af-name');
  if(nameInput) nameInput.focus();
  var subInput = document.querySelector('.subform input');
  if(subInput){ subInput.focus(); subInput.setSelectionRange(subInput.value.length, subInput.value.length); }
  var noteArea = document.querySelector('.noteform textarea');
  if(noteArea){ noteArea.focus(); noteArea.setSelectionRange(noteArea.value.length, noteArea.value.length); }
}
function findMember(key){
  var parts = key.split('|');
  var cat = data.categories.find(function(c){ return c.id===parts[0]; });
  if(!cat) return null;
  var idx = cat.members.findIndex(function(m){ return m.n===parts[1] && String(m.id)===parts[2]; });
  if(idx<0) return null;
  return {cat:cat, idx:idx, m:cat.members[idx]};
}
function closeMenus(){ document.querySelectorAll('.movemenu').forEach(function(el){ el.remove(); }); }
function openStatusMenu(btn, key){
  closeMenus();
  var found = findMember(key);
  if(!found) return;
  var menu = document.createElement('div');
  menu.className = 'movemenu';
  var opts = ['QMB','SLMB','Full','ABD','None'];
  menu.innerHTML = '<div class="mm-title">Medicaid status</div>'
    + opts.map(function(o){ return '<button data-ms="'+o+'">'+o+(found.m.ms===o?'  ✓':'')+'</button>'; }).join('')
    + (found.m.ms ? '<button data-ms="">Clear status</button>' : '');
  document.body.appendChild(menu);
  var r = btn.getBoundingClientRect();
  var left = Math.min(r.left + window.scrollX, window.scrollX + document.documentElement.clientWidth - 250);
  menu.style.left = left + 'px';
  menu.style.top = (r.bottom + window.scrollY + 4) + 'px';
  menu.addEventListener('click', function(e){
    var b = e.target.closest('button[data-ms]');
    if(!b) return;
    var v = b.getAttribute('data-ms');
    if(v) found.m.ms = v; else delete found.m.ms;
    save(); closeMenus(); render();
    showToast(found.m.n + '  ·  status: ' + (v || 'cleared'));
  });
}
function openMoveMenu(btn, key){
  closeMenus();
  var found = findMember(key);
  if(!found) return;
  var menu = document.createElement('div');
  menu.className = 'movemenu';
  var opts = [];
  data.categories.forEach(function(c){
    if(c.id!==found.cat.id || found.m.g) opts.push({cid:c.id, label:c.name, g:null});
  });
  if(found.cat.id!=='waiting' || found.m.g!=='Month Out'){
    opts.push({cid:'waiting', label:'Waiting to Submit — Month Out', g:'Month Out'});
  }
  menu.innerHTML = '<div class="mm-title">Move to</div>' + opts.map(function(o,i){
    var isSame = o.cid===found.cat.id && !o.g === !found.m.g;
    return isSame ? '' : '<button data-i="'+i+'"><span class="mdot" style="background:'+ACCENTS[o.cid]+'"></span>'+esc(o.label)+'</button>';
  }).join('');
  document.body.appendChild(menu);
  var r = btn.getBoundingClientRect();
  var mw = 240;
  var left = Math.min(r.left + window.scrollX, window.scrollX + document.documentElement.clientWidth - mw - 10);
  menu.style.left = left + 'px';
  menu.style.top = (r.bottom + window.scrollY + 4) + 'px';
  menu.addEventListener('click', function(e){
    var b = e.target.closest('button[data-i]');
    if(!b) return;
    var o = opts[+b.getAttribute('data-i')];
    var src = found.cat, m = found.m;
    src.members.splice(found.idx,1);
    var dest = data.categories.find(function(c){ return c.id===o.cid; });
    var moved = {n:m.n, id:m.id};
    if(m.ms) moved.ms = m.ms;
    if(m.sub) moved.sub = m.sub;
    if(m.note){ moved.note = m.note; if(m.noteDate) moved.noteDate = m.noteDate; }
    if(o.g) moved.g = o.g;
    if(o.cid==='corrdate'){ moved.eff = m.eff||''; moved.needed = m.needed||''; }
    dest.members.push(moved);
    save(); closeMenus(); render();
    showToast(m.n + '  →  ' + (o.g ? o.label : dest.name));
  });
}
var toastTimer;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.movemenu')) closeMenus();
  var card = e.target.closest('.card');
  if(card){
    var key = card.getAttribute('data-key');
    if(e.target.closest('.ms') || e.target.closest('.ms-add')){ openStatusMenu(e.target.closest('.ms') || e.target.closest('.ms-add'), key); return; }
    if(e.target.closest('.upbtn')){
      var fu = findMember(key);
      if(fu){ delete fu.m.g; save(); render(); showToast(fu.m.n + '  →  escalation list'); }
      return;
    }
    if(e.target.closest('.sub') || e.target.closest('.sub-add')){ editSubKey = key; editNoteKey = null; render(); return; }
    if(e.target.closest('.subform .today')){
      var fs = findMember(key);
      if(fs){ fs.m.sub = todayStr(); editSubKey = null; save(); render(); showToast('Submitted to DFCS ' + fs.m.sub); }
      return;
    }
    if(e.target.closest('.subform .go')){
      var fs2 = findMember(key);
      if(fs2){
        var dv = card.querySelector('.subform input').value.trim();
        if(dv){ fs2.m.sub = dv; } else { delete fs2.m.sub; }
        editSubKey = null; save(); render();
        showToast(dv ? 'DFCS date saved' : 'DFCS date removed');
      }
      return;
    }
    if(e.target.closest('.subform .no')){ editSubKey = null; render(); return; }
    if(e.target.closest('.subform')){ return; }
    if(e.target.closest('.nt') || e.target.closest('.note')){ editNoteKey = key; editSubKey = null; render(); return; }
    if(e.target.closest('.noteform .go')){
      var f = findMember(key);
      if(f){
        var txt = card.querySelector('.noteform textarea').value.trim();
        if(txt){
          if(f.m.note !== txt){ f.m.noteDate = fmtStamp(); }
          f.m.note = txt;
        } else { delete f.m.note; delete f.m.noteDate; }
        editNoteKey = null; save(); render();
        showToast(txt ? 'Note saved' : 'Note removed');
      }
      return;
    }
    if(e.target.closest('.noteform .no')){ editNoteKey = null; render(); return; }
    if(e.target.closest('.noteform')){ return; }
    if(e.target.closest('.mv')){ openMoveMenu(e.target.closest('.mv'), key); return; }
    if(e.target.closest('.rm')){
      var b = e.target.closest('.rm');
      if(b.getAttribute('data-armed')){
        var f = findMember(key);
        if(f){ f.cat.members.splice(f.idx,1); save(); render(); showToast('Removed ' + f.m.n); }
      } else {
        b.setAttribute('data-armed','1'); b.textContent = 'Sure?';
        setTimeout(function(){ if(b.isConnected){ b.removeAttribute('data-armed'); b.innerHTML='&times;'; } }, 2500);
      }
      return;
    }
    var el = e.target.closest('[data-copy]');
    if(el){
      var v = el.getAttribute('data-copy');
      if(navigator.clipboard) navigator.clipboard.writeText(v)['catch'](function(){});
      showToast('Copied  ·  ' + v);
      return;
    }
  }
  var col = e.target.closest('.col');
  if(col){
    var cid = col.getAttribute('data-cat');
    if(e.target.closest('.addbtn')){ openForm = cid; render(); return; }
    if(e.target.closest('.addform .no')){ openForm = null; render(); return; }
    if(e.target.closest('.addform .go')){
      var nm = col.querySelector('.af-name').value.trim();
      var idv = col.querySelector('.af-id').value.trim();
      if(!nm){ showToast('Enter a name first'); return; }
      var c = data.categories.find(function(x){ return x.id===cid; });
      var nu = {n:nm, id:idv};
      if(cid==='corrdate'){ nu.eff=''; nu.needed=''; }
      c.members.push(nu);
      openForm = null; save(); render(); showToast('Added ' + nm);
      return;
    }
  }
});
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && e.target.closest && e.target.closest('.addform')){
    var col = e.target.closest('.col');
    var go = col && col.querySelector('.addform .go');
    if(go) go.click();
  }
  if(e.key==='Enter' && e.target.closest && e.target.closest('.subform')){
    var sc = e.target.closest('.card');
    var sgo = sc && sc.querySelector('.subform .go');
    if(sgo) sgo.click();
  }
  if(e.key==='Escape'){ closeMenus(); document.getElementById('signPanel').style.display='none'; if(openForm || editNoteKey || editSubKey){ openForm=null; editNoteKey=null; editSubKey=null; render(); } }
});
document.getElementById('sortSel').addEventListener('change', function(e){ sort = e.target.value; render(); });
var signBtn = document.getElementById('signBtn');
var signPanel = document.getElementById('signPanel');
signBtn.addEventListener('click', function(){
  if(auth.currentUser){ auth.signOut(); showToast('Signed out - view only'); return; }
  var open = signPanel.style.display !== 'none';
  signPanel.style.display = open ? 'none' : 'flex';
  document.getElementById('spErr').textContent = '';
  if(!open) document.getElementById('spEmail').focus();
});
document.getElementById('spNo').addEventListener('click', function(){ signPanel.style.display = 'none'; });
document.getElementById('spGo').addEventListener('click', function(){
  var em = document.getElementById('spEmail').value.trim();
  var pw = document.getElementById('spPass').value;
  var err = document.getElementById('spErr');
  if(!em || !pw){ err.textContent = 'Enter the team email and password.'; return; }
  if(!FBOK){ err.textContent = 'No connection to the sync service. Reload the page and try again.'; return; }
  err.textContent = 'Signing in...';
  auth.signInWithEmailAndPassword(em, pw).then(function(){
    err.textContent = '';
    signPanel.style.display = 'none';
    document.getElementById('spPass').value = '';
    showToast('Signed in - editing is on');
  })['catch'](function(e2){
    err.textContent = 'Sign-in failed. Check the email and password.';
  });
});
document.getElementById('spPass').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('spGo').click();
});
if(FBOK) auth.onAuthStateChanged(function(user){
  if(user){ signBtn.textContent = 'Sign out'; signBtn.className = 'signbtn'; }
  else { signBtn.textContent = 'Sign in to edit'; signBtn.className = 'signbtn off'; }
  maybeSeed();
});
if(FBOK) db.ref('board').on('value', function(snap){
  var val = snap.val();
  booted = true;
  if(val === null){
    lastRemote = null;
    data = JSON.parse(DEFAULT_JSON);
    maybeSeed();
  } else {
    lastRemote = fromBoard(val);
    data = clone(lastRemote);
  }
  var ta = document.querySelector('.noteform textarea');
  var keep = ta ? ta.value : null;
  render();
  var ta2 = document.querySelector('.noteform textarea');
  if(ta2 && keep !== null) ta2.value = keep;
});
if(FBOK) db.ref('.info/connected').on('value', function(snap){
  var on = snap.val() === true;
  document.getElementById('livedot').className = on ? 'livedot on' : 'livedot';
  document.getElementById('livestate').textContent = on ? 'Live' : 'Connecting...';
});
if(!FBOK){
  document.getElementById('livedot').className = 'livedot';
  document.getElementById('livestate').textContent = 'Offline (view only)';
}
render();
</script>
</body>
</html>
