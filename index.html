<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCCM Communications Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --app-fg:#eaf1fb; --muted:#9db8dd; --hairline:rgba(255,255,255,.10);
    --col-bg:#14335f; --card-bg:#d9e9f6; --card-fg:#12335F; --card-muted:#4f6a8a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 120% at 50% -20%,#123a72,#0b2247 62%) fixed #0b2247;
    font-family:'Public Sans',system-ui,-apple-system,sans-serif;color:var(--app-fg)}
  a{color:#8fb9ec;text-decoration:none} a:hover{color:#fff}
  .wrap{min-height:100vh;padding:26px 30px 40px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
  .brand{display:flex;align-items:center;gap:18px}
  .brand img{height:58px;width:auto}
  .brand .divider{border-left:2px solid rgba(255,255,255,.16);padding-left:18px}
  .title{font-family:'Nunito',sans-serif;font-weight:800;font-size:24px;color:#fff;line-height:1.08}
  .subtitle{font-size:13px;color:var(--muted);margin-top:3px}
  label.sort{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:600}
  select{font-family:inherit;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#eaf1fb;
    border-radius:10px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer}
  select option{color:#12335F}
  .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:22px}
  .stat{background:var(--col-bg);border:1px solid rgba(255,255,255,.12);border-radius:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.22);padding:15px 17px}
  .stat .value{font-family:'Nunito',sans-serif;font-weight:800;font-size:32px;line-height:.95;font-variant-numeric:tabular-nums}
  .stat .label{font-size:12px;color:var(--muted);margin-top:7px;font-weight:600;letter-spacing:.01em}
  .board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;align-items:start}
  .col{background:var(--col-bg);border:1px solid rgba(255,255,255,.09);border-radius:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.25);overflow:visible;display:flex;flex-direction:column}
  .col-head{display:flex;align-items:center;gap:8px;padding:14px 14px 11px;border-bottom:1px solid rgba(255,255,255,.10)}
  .col-head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
  .col-head .name{font-family:'Nunito',sans-serif;font-weight:800;font-size:13.5px;color:#fff;line-height:1.22;flex:1;min-width:0}
  .col-head .count{background:color-mix(in srgb,var(--accent) 15%,#fff);color:#12335F;font-weight:700;font-size:12.5px;
    border-radius:20px;padding:2px 10px;font-variant-numeric:tabular-nums;flex:none}
  .cards{padding:11px 11px 13px;display:flex;flex-direction:column;gap:8px}
  .card{background:var(--card-bg);border:1px solid #c4dbef;border-left:4px solid var(--accent);border-radius:9px;padding:10px 12px}
  .cname{font-weight:600;font-size:13.5px;color:var(--card-fg);cursor:pointer;line-height:1.3}
  .cid{font-size:12.5px;color:var(--card-muted);cursor:pointer;font-variant-numeric:tabular-nums;margin-top:3px;letter-spacing:.01em}
  .dates{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:7px;font-size:11.5px;color:var(--card-muted)}
  .dates b{color:var(--card-fg);font-variant-numeric:tabular-nums}
  .grouplabel{font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    padding:9px 2px 3px;border-top:1px dashed var(--hairline);margin-top:3px}
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);background:#f2f7fc;color:#12335F;
    font-size:13.5px;font-weight:700;padding:10px 20px;border-radius:24px;box-shadow:0 12px 34px rgba(0,0,0,.35);z-index:100;
    transition:transform .18s ease,opacity .18s ease;opacity:0;pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  @media (max-width:1280px){ .board{grid-template-columns:repeat(3,minmax(0,1fr))} .stats{grid-template-columns:repeat(3,minmax(0,1fr))} }
  @media (max-width:760px){ .board{grid-template-columns:repeat(2,minmax(0,1fr))} .stats{grid-template-columns:repeat(2,minmax(0,1fr))} .wrap{padding:18px 14px 32px} }
  @media (max-width:480px){ .board{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <img id="logoimg" src="sccm_logo_white.png" alt="Second Chance Case Management" onerror="this.style.display='none'">
      <div class="divider">
        <div class="title">Communications Tracker</div>
        <div class="subtitle"><span id="total"></span> members &middot; Updated <span id="updated"></span></div>
      </div>
    </div>
    <label class="sort">Sort
      <select id="sortSel">
        <option value="default">Default order</option>
        <option value="name">Name &middot; A&ndash;Z</option>
        <option value="id">ID number</option>
      </select>
    </label>
  </div>
  <div class="stats" id="stats"></div>
  <div class="board" id="board"></div>
</div>
<div id="toast"></div>
<script>
const DATA = {
  lastUpdated: "July 21, 2026",
  categories: [
    {id:"submit",name:"Need to Submit to DFCS",members:[
      {n:"Hickey, Susie",id:"362282"},{n:"Hartley, Audrey",id:"74799"},{n:"Cornell, Sylvia",id:"184728"},
      {n:"Davis, Michael",id:"87979"},{n:"Vasquez, Jose",id:"91014"},{n:"Pirulis, Froso",id:"96383"},
      {n:"Griffin, Wanda",id:"450346"}
    ]},
    {id:"waiting",name:"Waiting to Submit Escalation List",members:[
      {n:"Mccollum-Parks, Deborah",id:"94396"},{n:"Walker, James",id:"483582"},{n:"Jefferson, Lucille",id:"98690"},
      {n:"Davis, Mary",id:"89341"},{n:"Tribble, Gloria",id:"94219"},{n:"Dodson, Sylinda",id:"485411"},
      {n:"Mace, Donald",id:"91773"},{n:"Sears, Maduria",id:"97090"},{n:"Rodriguez-Elias, Orlando",id:"88925"},
      {n:"Turner, Ashley",id:"89079"},{n:"Rogers, Alvina",id:"99292"},{n:"Powell, Fred",id:"88004"},
      {n:"Johnson, Willie",id:"88898"},{n:"Pride, Emmette",id:"87459"},{n:"Aina-Adedokun, Funmi",id:"94574"},
      {n:"Raybon, Barbara",id:"98734"},{n:"Jones, Dave",id:"87771"},{n:"Hunter, Betty Jean",id:"91808"},
      {n:"Battle, Tommy",id:"84620"},{n:"O'Shields, Sharon",id:"96310"},{n:"Richardson, Ruth",id:"96782"},
      {n:"Walker, Daniel",id:"25035"},{n:"Johnson, Billy",id:"484528"},{n:"Samuels, Tory",id:"483373"},
      {n:"Jones, DMontae",id:"82474",g:"Month Out"},{n:"Wells, Joanna",id:"184842",g:"Month Out"},
      {n:"Adamson, Carolyn",id:"97977",g:"Month Out"},{n:"Williams, Lucille",id:"95657",g:"Month Out"}
    ]},
    {id:"awaiting",name:"Awaiting Escalation List Return",members:[
      {n:"Stewart, Francis",id:"71813"},{n:"Nguyen, Dung",id:"81499"}
    ]},
    {id:"nocomm",name:"No Communication",members:[
      {n:"Garrett, Betty",id:"89936"},{n:"Almeida, Taryn",id:"86154"}
    ]},
    {id:"active",name:"Active Communication",members:[
      {n:"Long, Harry",id:"488329"},{n:"Ha, A",id:"97658"},{n:"Wondemagenehu, Roman",id:"95222"}
    ]},
    {id:"corrdate",name:"Need Corrected Approval Date",members:[
      {n:"Samuels, Tory",id:"483373",eff:"7/1/26",needed:"3/23/26"},
      {n:"Spears, Kevin",id:"93964",eff:"3/1/26",needed:"12/18/25"},
      {n:"Bohannon, Teresa",id:"449497",eff:"",needed:"2/1/26"}
    ]}
  ]
};
const ACCENTS = {submit:'#C0873C',waiting:'#3E72A8',awaiting:'#3E8C8C',nocomm:'#B0607F',active:'#4E8B62',corrdate:'#6E63A6'};
let sort = 'default';

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sortMembers(list){
  const arr = [...list];
  if(sort==='name') arr.sort((a,b)=>a.n.localeCompare(b.n));
  else if(sort==='id') arr.sort((a,b)=>String(a.id||'').localeCompare(String(b.id||''),undefined,{numeric:true}));
  return arr;
}
function cardHTML(m, isCorr){
  let html = '<div class="card">'
    + '<div class="cname" data-copy="'+esc(m.n)+'" title="Click to copy name">'+esc(m.n)+'</div>'
    + '<div class="cid" data-copy="'+esc(m.id)+'" title="Click to copy ID">'+esc(m.id)+'</div>';
  if(isCorr){
    html += '<div class="dates"><span>Effective <b>'+esc(m.eff||'—')+'</b></span><span>Needed <b>'+esc(m.needed||'—')+'</b></span></div>';
  }
  if(m.note){ html += '<div class="dates">'+esc(m.note)+'</div>'; }
  return html + '</div>';
}
function render(){
  const total = DATA.categories.reduce((a,c)=>a+c.members.length,0);
  document.getElementById('total').textContent = total;
  document.getElementById('updated').textContent = DATA.lastUpdated;
  const byId = id => (DATA.categories.find(c=>c.id===id)||{members:[]}).members.length;
  const stats = [
    {label:'Total members', value:total, accent:'#5B93D0'},
    {label:'Need to submit', value:byId('submit'), accent:'#D69A4E'},
    {label:'Awaiting escalation', value:byId('waiting'), accent:'#5E93C8'},
    {label:'No communication', value:byId('nocomm'), accent:'#C87E9A'},
    {label:'Need corrected date', value:byId('corrdate'), accent:'#8E83C0'}
  ];
  document.getElementById('stats').innerHTML = stats.map(s =>
    '<div class="stat"><div class="value" style="color:'+s.accent+'">'+s.value+'</div><div class="label">'+esc(s.label)+'</div></div>'
  ).join('');
  document.getElementById('board').innerHTML = DATA.categories.map(c => {
    const sorted = sortMembers(c.members);
    const main = sorted.filter(m=>!m.g);
    const gNames = [...new Set(sorted.filter(m=>m.g).map(m=>m.g))];
    const isCorr = c.id==='corrdate';
    let cards = main.map(m=>cardHTML(m,isCorr)).join('');
    for(const g of gNames){
      cards += '<div class="grouplabel">'+esc(g)+'</div>'
        + sorted.filter(m=>m.g===g).map(m=>cardHTML(m,isCorr)).join('');
    }
    return '<div class="col" style="--accent:'+ACCENTS[c.id]+'">'
      + '<div class="col-head"><span class="dot"></span><span class="name">'+esc(c.name)+'</span><span class="count">'+c.members.length+'</span></div>'
      + '<div class="cards">'+cards+'</div></div>';
  }).join('');
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 1600);
}
document.addEventListener('click', e => {
  const el = e.target.closest('[data-copy]');
  if(!el) return;
  const v = el.getAttribute('data-copy');
  if(navigator.clipboard) navigator.clipboard.writeText(v).catch(()=>{});
  showToast('Copied  ·  ' + v);
});
document.getElementById('sortSel').addEventListener('change', e => { sort = e.target.value; render(); });
render();
</script>
</body>
</html>
